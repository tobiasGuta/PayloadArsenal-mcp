name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: ruff format --check .
      - run: ruff check .
      - run: pytest --cov=. --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: docker build --pull=false --tag payload-arsenal-mcp:ci .
      - run: python scripts/docker_mcp_smoke.py payload-arsenal-mcp:ci
